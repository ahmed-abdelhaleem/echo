# Echo — local development stack
#
# Phase-0 local environment per docs/05_Technical_Architecture.md and docs/06_Tech_Stack.md.
# Brings up the three data-layer services the application services need to start.
#
# Notes:
# - Postgres has multiple databases pre-created via the init script in infra/docker/postgres/init/.
# - NATS runs with JetStream enabled per docs/06_Tech_Stack.md.
# - Ory Kratos public API listens on :4433, admin API on :4434.
#   Identity schema + server config live in infra/kratos/.
# - Values shown here are local-dev defaults only and are documented in plain text per AGENTS.md
#   (passwords used exclusively for local development are not secrets).

name: echo

services:
  postgres:
    image: postgres:16-alpine
    container_name: echo-postgres
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo_dev
      POSTGRES_DB: echo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: echo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: echo-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"  # client
      - "8222:8222"  # monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kratos schema migrations — runs once, then exits.
  kratos-migrate:
    image: oryd/kratos:v1.3.1
    container_name: echo-kratos-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DSN: postgres://echo:echo_dev@postgres:5432/kratos?sslmode=disable
    command: ["migrate", "sql", "-e", "--yes"]
    volumes:
      - ./infra/kratos:/etc/config/kratos:ro
    restart: on-failure

  kratos:
    image: oryd/kratos:v1.3.1
    container_name: echo-kratos
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    ports:
      - "4433:4433"  # public API
      - "4434:4434"  # admin API
    environment:
      DSN: postgres://echo:echo_dev@postgres:5432/kratos?sslmode=disable
    command: ["serve", "-c", "/etc/config/kratos/kratos.yml", "--dev", "--watch-courier"]
    volumes:
      - ./infra/kratos:/etc/config/kratos:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4434/admin/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  nats_data:
