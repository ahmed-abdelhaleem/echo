[project]
name = "echo-ml-py"
version = "0.1.0"
description = "Echo ML service: trait scoring, Portrait generation, reflection generation."
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Echo" }]
license = { text = "Proprietary" }

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "structlog>=24.4.0",
    "grpcio>=1.66.0",
    "grpcio-tools>=1.66.0",
    "protobuf>=5.27.0",
    # Pillow underpins the parametric Portrait renderer (T-ML-030 /
    # T-ML-031). Used for static 1080x1080 PNG composition and animated
    # WebP loop encoding. Pure-Python stdlib was sufficient for the M1
    # placeholder; M2 requires alpha compositing, gradients, and WebP
    # encoding which are not in stdlib.
    "pillow>=11.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
    "grpcio-testing>=1.66.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Auto-generated proto stubs: don't format or lint them. `make proto`
# regenerates this directory; humans should not edit it.
extend-exclude = ["app/grpc_gen"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "RUF", # ruff-specific
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]
# Auto-generated proto stubs: don't fight protoc's output. The package
# is regenerated by `make proto`; humans should not edit it.
"app/grpc_gen/*" = ["ALL"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
# Generated proto stubs are committed (so CI doesn't need protoc) but
# aren't worth type-checking — protoc emits dynamic attribute access
# that mypy can't follow. Re-running `make proto` regenerates them.
exclude = ["app/grpc_gen/"]

[[tool.mypy.overrides]]
module = ["app.grpc_gen.*", "grpc", "grpc.*", "google.protobuf", "google.protobuf.*"]
ignore_errors = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
    "grpcio-testing>=1.66.0",
]
