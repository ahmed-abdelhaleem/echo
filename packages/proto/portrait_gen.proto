syntax = "proto3";

package echo.portrait.v1;

option go_package = "github.com/ahmed-abdelhaleem/echo/services/core-go/grpc/echopb";

// PortraitGenService generates a parametric Portrait deterministically from
// (TraitVector, seed). MVP is server-side parametric rendering using Pillow/Cairo;
// AI image generation is explicitly deferred per docs/05_Technical_Architecture.md.
service PortraitGenService {
  rpc Generate(GeneratePortraitRequest) returns (GeneratePortraitResponse);
}

message GeneratePortraitRequest {
  string playthrough_id = 1;
  // Optional seed for stable regeneration; defaults to a hash of trait_vector.
  uint64 seed = 2;
  // Trait vector. Stateless RPC: the caller computes the vector and
  // passes it in. ml-py does not reach into core-go's Postgres. The
  // dimension ordering matches services/core-go/content/types.go and
  // services/ml-py/app/services/trait_scoring.py.
  repeated double big_five = 3;     // 5 values
  repeated double schwartz = 4;     // 10 values
  repeated double attachment = 5;   // 3 values
  // When true, the response includes an inline animated WebP loop
  // (T-ML-031). The static PNG is always rendered. Animation roughly
  // doubles render time and is only needed for the share-web Story /
  // in-app reveal surfaces.
  bool animate = 6;
}

message GeneratePortraitResponse {
  // Inline static PNG bytes. The M2 parametric renderer produces a
  // 1080x1080 image; the M1 stub produced a 64x64 image. Both are
  // deterministic for a given trait vector + seed.
  bytes png = 1;
  // Cloudflare R2 keys for the rendered assets. Populated once
  // T-CORE-030 (sharing) wires R2; empty when the caller did not
  // request persistence.
  string static_png_key = 2;
  string animated_webp_key = 3;
  // Bumped when the renderer changes in a way that would produce a
  // different image for the same trait vector. M1 stub == 1; M2
  // parametric renderer == 2.
  uint32 renderer_version = 4;
  // Inline animated WebP bytes (T-ML-031). 1080x1080, ~2-second loop,
  // <800 KB. Empty when the caller did not request animation.
  bytes animated_webp = 5;
}
